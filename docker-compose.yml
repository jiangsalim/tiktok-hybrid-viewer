version: '3.8'

services:
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PEER_SERVICE_URL=http://peer-service:8081
      - TRENDING_SERVICE_URL=http://trending-service:8082
      - PROXY_SERVICE_URL=http://proxy-service:8083
      - TELEMETRY_SERVICE_URL=http://telemetry-service:8084
    depends_on:
      - peer-service
      - trending-service
      - telemetry-service

  peer-service:
    build:
      context: ./backend/services/peer-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081

  trending-service:
    build:
      context: ./backend/services/trending-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082

  proxy-service:
    build:
      context: ./backend/services/proxy-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083

  telemetry-service:
    build:
      context: ./backend/services/telemetry-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
